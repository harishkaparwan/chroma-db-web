      <path d="M92 165L155 190L203 145L250 169L298 145L345 190L408 165" stroke-width="3" opacity="0.8" />
      <path d="M121 222L180 249L223 217L277 217L320 249L379 222" stroke-width="3" opacity="0.7" />
      <path d="M160 301L214 281L250 331L286 281L340 301" stroke-width="3" opacity="0.72" />
    </g>
  </g>

  <g filter="url(#softGlow)">
    <g fill="url(#nodeGradient)" stroke="#ffffff" stroke-opacity="0.82" stroke-width="3">
      <circle cx="92" cy="165" r="8" />
      <circle cx="121" cy="222" r="10" />
      <circle cx="139" cy="136" r="9" />
      <circle cx="155" cy="190" r="7" />
      <circle cx="180" cy="249" r="11" />
      <circle cx="203" cy="145" r="10" />
      <circle cx="214" cy="281" r="8" />
      <circle cx="223" cy="217" r="7" />
      <circle cx="250" cy="169" r="9" />
      <circle cx="250" cy="331" r="7" />
      <circle cx="277" cy="217" r="7" />
      <circle cx="286" cy="281" r="8" />
      <circle cx="298" cy="145" r="10" />
      <circle cx="320" cy="249" r="11" />
      <circle cx="345" cy="190" r="7" />
      <circle cx="361" cy="136" r="9" />
      <circle cx="379" cy="222" r="10" />
      <circle cx="408" cy="165" r="8" />
    </g>

    <g stroke="url(#heartGradient)" stroke-width="4" stroke-linecap="round">
      <path d="M92 165L68 142" />
      <path d="M139 136L137 101" />
      <path d="M203 145L218 108" />
      <path d="M298 145L283 108" />
      <path d="M361 136L363 101" />
      <path d="M408 165L432 142" />
      <path d="M121 222L84 222" />
