    </g>
  </g>

  <g filter="url(#neonGlow)">
    <text x="250" y="420" text-anchor="middle" fill="url(#textGradient)" font-family="Arial" font-size="64" font-weight="800" letter-spacing="6">CHROMA</text>
    <text x="250" y="462" text-anchor="middle" fill="url(#textGradient)" font-family="Arial" font-size="38" font-weight="800" letter-spacing="14">DB</text>
