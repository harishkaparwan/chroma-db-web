<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="500" height="480" viewBox="0 0 500 480" role="img" aria-labelledby="title desc">
  <title id="title">Chroma DB logo</title>
  <desc id="desc">A neon heart-shaped neural network above the Chroma DB wordmark.</desc>
  <defs>
    <linearGradient id="heartGradient" x1="20%" y1="10%" x2="80%" y2="90%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="35%" stop-color="#8a2be2" />
      <stop offset="65%" stop-color="#ff00ff" />
      <stop offset="100%" stop-color="#ff1493" />
    </linearGradient>

    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#00bfff" />
      <stop offset="45%" stop-color="#ba55d3" />
      <stop offset="100%" stop-color="#ff69b4" />
    </linearGradient>

    <radialGradient id="nodeGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="38%" stop-color="#9ffcff" />
      <stop offset="72%" stop-color="#b966ff" />
      <stop offset="100%" stop-color="#ff4dda" />
    </radialGradient>

    <filter id="neonGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur1" />
      <feFlood flood-color="#00f0ff" result="glow1" />
      <feComposite in="glow1" in2="blur1" operator="in" result="coloredGlow1" />
      <feGaussianBlur stdDeviation="4" result="blur2" />
      <feFlood flood-color="#ff00ff" result="glow2" />
      <feComposite in="glow2" in2="blur2" operator="in" result="coloredGlow2" />
      <feMerge>
        <feMergeNode in="coloredGlow1" />
        <feMergeNode in="coloredGlow2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feFlood flood-color="#ff4dda" flood-opacity="0.9" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="500" height="480" rx="34" fill="#0d1024" />
  <g opacity="0.16">
    <path d="M0 0h500v480H0z" fill="#0d1024" />
    <path d="M0 0h20v20H0zM40 0h20v20H40zM80 0h20v20H80zM120 0h20v20h-20zM160 0h20v20h-20zM200 0h20v20h-20zM240 0h20v20h-20zM280 0h20v20h-20zM320 0h20v20h-20zM360 0h20v20h-20zM400 0h20v20h-20zM440 0h20v20h-20zM480 0h20v20h-20z" fill="#ffffff" />
    <path d="M20 20h20v20H20zM60 20h20v20H60zM100 20h20v20h-20zM140 20h20v20h-20zM180 20h20v20h-20zM220 20h20v20h-20zM260 20h20v20h-20zM300 20h20v20h-20zM340 20h20v20h-20zM380 20h20v20h-20zM420 20h20v20h-20zM460 20h20v20h-20z" fill="#ffffff" />
  </g>

  <g filter="url(#neonGlow)">
    <path
      d="M250 105C170 38 72 68 72 165C72 235 125 285 250 355C375 285 428 235 428 165C428 68 330 38 250 105Z"
      fill="none"
      stroke="url(#heartGradient)"
      stroke-width="19"
      stroke-linejoin="round"
    />

    <g fill="none" stroke="url(#heartGradient)" stroke-linecap="round">
      <path d="M101 164C154 115 207 112 250 169C294 112 352 117 399 164" stroke-width="4" opacity="0.78" />
      <path d="M110 207C160 184 206 194 250 247C294 194 340 184 390 207" stroke-width="4" opacity="0.72" />
      <path d="M135 257C177 244 214 262 250 314C286 262 323 244 365 257" stroke-width="4" opacity="0.68" />
      <path d="M139 136C183 175 205 215 213 322" stroke-width="3" opacity="0.6" />
