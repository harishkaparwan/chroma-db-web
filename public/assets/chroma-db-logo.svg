      <circle cx="68" cy="142" r="7" />
      <circle cx="137" cy="101" r="9" />
      <circle cx="218" cy="108" r="6" />
      <circle cx="283" cy="108" r="6" />
      <circle cx="363" cy="101" r="9" />
      <circle cx="432" cy="142" r="7" />
